<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Crypto Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header id="mainHeader">
    <div class="left-side">
      <span class="logo">◈</span>
      <h1>Crypto<span class="yellow-text">Tracker</span></h1>
    </div>
    <div class="right-side">
      <button id="reloadBtn" class="small-btn" title="Reload prices">Ref</button>
    </div>
  </header>

  <main id="content">

    <section id="marketOverview" class="overview-boxes" aria-label="Market overview stats">
      <div class="info-box loading-placeholder">
        <div class="placeholder-bar big"></div>
        <div class="placeholder-bar small"></div>
      </div>
      <div class="info-box loading-placeholder">
        <div class="placeholder-bar big"></div>
        <div class="placeholder-bar small"></div>
      </div>
      <div class="info-box loading-placeholder">
        <div class="placeholder-bar big"></div>
        <div class="placeholder-bar small"></div>
      </div>
      <div class="info-box loading-placeholder">
        <div class="placeholder-bar big"></div>
        <div class="placeholder-bar small"></div>
      </div>
    </section>

    <section class="toolbar">
      <div class="sorting-buttons">
        <span class="toolbar-label">Sort by</span>
        <button class="pill-btn active" data-sort="market_cap_desc">Market Cap</button>
        <button class="pill-btn" data-sort="price_desc">Price</button>
        <button class="pill-btn" data-sort="change_desc">24h %</button>
        <button class="pill-btn" data-sort="volume_desc">Volume</button>
      </div>
    </section>

    <section id="tableArea" aria-label="List of cryptocurrencies">
      <div class="table-container">
        <table id="coinTable">
          <thead>
            <tr>
              <th class="col-rank">#</th>
              <th class="col-name">Coin</th>
              <th class="col-price">Price</th>
              <th class="col-change">24h %</th>
              <th class="col-mcap">Market Cap</th>
              <th class="col-volume">Volume (24h)</th>
            </tr>
          </thead>
          <tbody id="tableRows">
          </tbody>
        </table>
      </div>
    </section>

    <div id="errorBox" class="error-msg not-visible">
      <p id="errorText">Something went wrong</p>
    </div>

  </main>

  <script src="script.js"></script>
</body>

</html>
